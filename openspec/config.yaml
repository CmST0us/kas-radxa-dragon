schema: spec-driven

# Project context (shown to AI when creating artifacts)
context: |
  本工程为 kas-radxa-dragon —— Radxa Dragon Q6A（QCS6490）的 kas/Yocto 集成仓库。
  仓库知识库维护在 wiki/，其规约见根目录 CLAUDE.md。

  == 提案语言 ==
  - 工程的所有提案（proposal/design/tasks 等）必须使用「中文」撰写。
  - 仅「术语」可保留原文，如代码标识符、命令、配置项、layer/commit、专有名词
    （kas、Yocto、bitbake、QCS6490 等）。除此之外不得用外文行文。

  == 表述要求 ==
  - 提案表述必须清晰、易懂，让人一读就能准确理解其意图与方案。
  - 不允许拗口、含糊、绕弯子或模棱两可的句子。能用短句说清的不用长句，
    先结论后展开，必要时用列表/表格替代大段文字。

  == 分层设计（硬性结构）==
  - 提案设计必须是「分层、由浅入深」的，层次划分清晰，逐层递进，依次覆盖：
    1) 系统方案：整体目标、边界、与现有系统的关系（最浅、最宏观）；
    2) 模块方案：拆分为哪些模块、各模块职责与接口；
    3) 流程时序：模块间的调用/数据/时序关系，关键路径；
    4) 实现细节：具体配置、文件、命令、代码改动（最深、最具体）。
  - 上层不陷入下层细节，下层不重复上层结论；读者可按需停在任一层。

  == 实施阶段：Agent Work Team ==
  - 提案进入实施阶段时，使用 Subagent 进行提案工作的派发，并组建一个
    「Agent Work Team」对实施全过程进行控制。
  - 团队由三个角色组成，职责边界明确：
    * 产品（Product）：对交付物的「最终用户体验成功」负责；
    * 研发（Engineering）：对「交付物本身」负责；
    * QA 测试（QA）：对「最终交付质量」负责。
  - 研发与产品是「密切协作」关系：研发需具备产品思维，方案在研发与产品
    不断「打合」（反复对齐、互相挑战与修正）的过程中迭代，目标是产出双方
    共同认可的最好效果，而非一次性交付。

  == 归档到 wiki ==
  - 提案「最终确认完成」后，必须把提案的内容总结、归纳并回填进 wiki/
    （新建页面或并入已有页面），并按 CLAUDE.md 规约在 wiki/log.md 追加记录。
    不要让结论只停留在提案或对话里。

# Per-artifact rules
rules:
  proposal:
    - 必须使用中文撰写，仅术语（代码标识符、命令、配置项、专有名词）可保留原文。
    - 表述清晰易懂、不拗口；先结论后展开，多用短句与列表。
  design:
    - 必须使用中文撰写，仅术语可保留原文。
    - 必须分层、由浅入深，依次包含：系统方案 → 模块方案 → 流程时序 → 实现细节。
    - 每一层只写该层该有的内容；上层不陷入细节，下层不复述上层结论。
  tasks:
    - 必须使用中文描述，仅术语可保留原文。
    - 实施通过 Subagent 派发，并组建 Agent Work Team（产品 / 研发 / QA）控制全过程。
    - 角色职责：产品对最终用户体验成功负责，研发对交付物负责，QA 对交付质量负责。
    - 研发与产品密切协作、反复打合，迭代出双方共同认可的最好效果。
    - 提案确认完成后，把内容总结归纳回填到 wiki/，并在 wiki/log.md 追加记录。
